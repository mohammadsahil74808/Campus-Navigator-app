name: campus_prototype
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  geolocator: ^9.0.2
  http: ^1.2.2
  flutter_tts: ^3.8.5
  flutter_dotenv: ^6.0.0
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.0
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  provider: ^6.1.1
  font_awesome_flutter: ^10.7.0
  animated_text_kit: ^4.2.2
  animations: ^2.0.8
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.13.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.4.0
  location: ^8.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 🔥 Added for custom app icon
  flutter_launcher_icons: ^0.13.1

# 🔥 Icon Configuration
flutter_icons:
  android: true
  ios: true
  image_path: "assets/my_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/map_dark.json
    - assets/logo.png
